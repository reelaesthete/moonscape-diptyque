<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: rgb(248, 247, 244);
  font-family: sans-serif;
}

/* HEADER */
.header {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(255,255,255,0.95);
  color: #000000; /* FORCE BLACK */
  font-size: 12px;
  letter-spacing: 0.08em;
}

/* SPLIT AREA */
.wrap {
  display: flex;
  width: 100vw;
  height: calc(100vh - 48px);
}

/* PANELS */
.panel {
  height: 100%;
  overflow: hidden;
  position: relative;
}

/* DIVIDER */
.divider {
  width: 6px;
  cursor: col-resize;
  background: rgba(0,0,0,0.08);
  z-index: 10;
}

.divider:hover {
  background: rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="header">
  <div>MOONSCAPE I</div>
  <div>MOONSCAPE II</div>
</div>

<div class="wrap">
  <div id="left" class="panel" style="width:50%"></div>
  <div id="divider" class="divider"></div>
  <div id="right" class="panel" style="width:50%"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

<script>
/* ---------------- DRAG ---------------- */

const divider = document.getElementById("divider");
const left = document.getElementById("left");
const right = document.getElementById("right");

let dragging = false;

divider.addEventListener("mousedown", () => dragging = true);
window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const percent = (e.clientX / window.innerWidth) * 100;

  left.style.width = percent + "%";
  right.style.width = (100 - percent) + "%";

  window.dispatchEvent(new Event("resize"));
});


/* ---------------- MOONSCAPE 1 ---------------- */

new p5((p) => {

let go;
let tick = 0;
let i = 0.1;
let host;

p.setup = function() {
  host = document.getElementById("left");
  p.createCanvas(host.clientWidth, host.clientHeight);
  p.colorMode(p.HSB);
  p.noStroke();
};

p.windowResized = function() {
  p.resizeCanvas(host.clientWidth, host.clientHeight);
};

p.draw = function() {

  go = (p.frameCount % 60) / 60;

  let x = p.random(p.width);
  let y = p.random(p.height);

  let screenbuf = p.get(0, 0, p.width, p.height);
  p.image(screenbuf, -0.5, 1);

  let blap = p.get(p.random(0.1), p.random(0.1), p.width, p.height);
  p.image(blap, 0.1, 1.111);

  p.stroke(0.01);
  p.strokeWeight(0.02);

  let r = (p.width / p.PI) * 2.9;
  let r2 = 180 + 2 * i - 3 * r;

  if (tick < 10) {
    for (let j = 1; j < 7000; j++) {
      mark(x, y, j * 2, (j * p.sin(100)) / 13, [(r2++ * 1.9) % 300, 100, 100]);
    }
  }

  let r3 = p.PI * (i * r);

  if (tick < 100) {
    for (let j = 1; j < 7000; j++) {
      mark(x, y, j * 3.2, (j * p.sin(1000)) / 100, [(r3 * 1) % 300, 100, 100]);
    }
  }

  function mark(x0, y0, length, angle, color) {
    p.push();
    p.translate(x0, y);
    p.translate(x, y0);
    let x1 = length * p.cos(angle);
    let y1 = length * p.sin(angle);
    p.stroke(color);
    p.line(0, 0, x1, y1);
    p.pop();
  }

};

}, "left");


/* ---------------- MOONSCAPE 2 ---------------- */

new p5((p) => {

let tick = 0;
let i = 0;
let x = 0;
let host;

p.setup = function() {
  host = document.getElementById("right");
  p.createCanvas(host.clientWidth, host.clientHeight);
  p.colorMode(p.HSB);
  p.noStroke();
};

p.windowResized = function() {
  p.resizeCanvas(host.clientWidth, host.clientHeight);
};

p.draw = function() {

  p.stroke(0.1);
  p.strokeWeight(0.01);

  let randomX = p.random(p.width);
  let randomY = p.random(p.height);

  let sinX = p.map(p.sin(x), -1, 1, 0, p.height);
  let sinY = 15 * p.sin(x / 0.5 + 185) - 54;

  let screenbuf = p.get(0, 0, p.width, p.height);
  p.image(screenbuf, 0.05, 1);

  let blap = p.get(p.random(0.1), p.random(0.1), p.width, p.height);
  p.image(blap, 0.1, 0.111);

  let r = (p.width / p.PI) * 2;
  let r3 = 1.3 + (2 * i) - (3 * r);

  if (tick < 10) {
    for (let j = 1; j < 4000; j++) {
      mark(randomX, randomY, j * 50.3, (j * p.sin(1.1)) / 45, [(r3++ * 1) % 300, 100, 100]);
    }
  }

  function mark(x0, y0, length, angle, color) {
    p.push();
    p.translate(randomX, y0);
    let x1 = length * p.cos(angle);
    let y1 = length * p.sin(angle);
    p.stroke(color);
    p.line(0, 0, x1, y1);
    p.pop();
  }

};

}, "right");

</script>

</body>
</html>
